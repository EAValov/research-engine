name: Publish Containers

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-containers-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.image_title }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: research-api
            image_title: Research Engine API
            image_description: Research Engine backend API container
            context: ./ResearchEngine.API
            file: ./ResearchEngine.API/Containerfile
          - image_name: research-webui
            image_title: Research Engine Web UI
            image_description: Research Engine web UI container served by Caddy
            context: ./ResearchEngine.WebUI
            file: ./ResearchEngine.WebUI/Containerfile

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Prepare image metadata inputs
        id: prep
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          echo "owner_lc=${REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "source_url=${REPOSITORY_URL}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.prep.outputs.owner_lc }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ steps.prep.outputs.version }}
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image_title }}
            org.opencontainers.image.description=${{ matrix.image_description }}
            org.opencontainers.image.source=${{ steps.prep.outputs.source_url }}
            org.opencontainers.image.url=${{ steps.prep.outputs.source_url }}
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.version=${{ steps.prep.outputs.version }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          build-args: |
            APP_VERSION=${{ steps.prep.outputs.version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}
