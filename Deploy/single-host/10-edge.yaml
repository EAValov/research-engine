apiVersion: v1
kind: ConfigMap
metadata:
  name: research-edge-caddyfile
data:
  Caddyfile: |
    {
      admin off
    }
    http://localhost:8090 {
      encode zstd gzip
      @api path /api* /health* /openapi* /scalar* /hangfire*
      reverse_proxy @api research-app:8080
      reverse_proxy research-app:8082
    }
    https://research-webui.llm.local:8443 {
      tls internal
      encode zstd gzip
      @api path /api* /health* /openapi* /scalar* /hangfire*
      reverse_proxy @api research-app:8080
      reverse_proxy research-app:8082
    }
    https://research-api.llm.local:8443 {
      tls internal
      encode zstd gzip
      reverse_proxy research-app:8080
    }

---
apiVersion: v1
kind: Pod
metadata:
  name: research-edge
spec:
  hostname: research-edge
  containers:
    - name: caddy
      image: docker.io/library/caddy:2.8
      ports:
        - containerPort: 8090
          hostPort: 8090
        - containerPort: 8443
          hostPort: 8443
      volumeMounts:
        - name: caddy-data
          mountPath: /data
        - name: caddy-config
          mountPath: /etc/caddy/Caddyfile
          subPath: Caddyfile
      env:
        - name: XDG_DATA_HOME
          value: /data
  volumes:
    - name: caddy-data
      persistentVolumeClaim:
        claimName: research-edge-caddy-data
    - name: caddy-config
      configMap:
        name: research-edge-caddyfile
