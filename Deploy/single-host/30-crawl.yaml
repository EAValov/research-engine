apiVersion: v1
kind: ConfigMap
metadata:
  name: crawl-searxng-config
data:
  settings.yml: |
    use_default_settings: true
    general:
      instance_name: "Research Stack Search"
    server:
      bind_address: "0.0.0.0"
      port: 8085
      secret_key: "overwritten-by-secret"
    search:
      formats:
        - html
        - json
    ui:
      static_use_hash: true

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: crawl-schema-fix
data:
  nuq-schema-fix.sql: |
    CREATE SCHEMA IF NOT EXISTS nuq;

    DO $$ BEGIN
      CREATE TYPE nuq.job_status AS ENUM ('queued', 'active', 'completed', 'failed');
    EXCEPTION
      WHEN duplicate_object THEN null;
    END $$;

    CREATE TABLE IF NOT EXISTS nuq.queue_crawl_finished (
      id uuid NOT NULL DEFAULT gen_random_uuid(),
      status nuq.job_status NOT NULL DEFAULT 'queued'::nuq.job_status,
      data jsonb,
      created_at timestamp with time zone NOT NULL DEFAULT now(),
      priority int NOT NULL DEFAULT 0,
      lock uuid,
      locked_at timestamp with time zone,
      stalls integer,
      finished_at timestamp with time zone,
      listen_channel_id text,
      returnvalue jsonb,
      failedreason text,
      owner_id uuid,
      group_id uuid,
      CONSTRAINT queue_crawl_finished_pkey PRIMARY KEY (id)
    );

    CREATE INDEX IF NOT EXISTS queue_crawl_finished_active_locked_at_idx
      ON nuq.queue_crawl_finished USING btree (locked_at)
      WHERE (status = 'active'::nuq.job_status);
    CREATE INDEX IF NOT EXISTS nuq_queue_crawl_finished_queued_optimal_2_idx
      ON nuq.queue_crawl_finished (priority ASC, created_at ASC, id)
      WHERE (status = 'queued'::nuq.job_status);
    CREATE INDEX IF NOT EXISTS nuq_queue_crawl_finished_failed_created_at_idx
      ON nuq.queue_crawl_finished USING btree (created_at)
      WHERE (status = 'failed'::nuq.job_status);
    CREATE INDEX IF NOT EXISTS nuq_queue_crawl_finished_completed_created_at_idx
      ON nuq.queue_crawl_finished USING btree (created_at)
      WHERE (status = 'completed'::nuq.job_status);

---

apiVersion: v1
kind: Secret
metadata:
  name: research-crawl-secrets
type: Opaque
stringData:
  CRAWL_POSTGRES_DB: "postgres"
  CRAWL_POSTGRES_USER: "firecrawl"
  CRAWL_POSTGRES_PASSWORD: "firecrawl-password"
  CRAWL_DATABASE_URL: "postgresql://firecrawl:firecrawl-password@127.0.0.1:5432/postgres?sslmode=disable"
  CRAWL_RABBITMQ_URL: "amqp://guest:guest@127.0.0.1:5672"
  BULL_AUTH_KEY: "28d4f12a03a9476ba93e59e3fa752623e090f9798ff94d1089dd5f706ae8213f"
  SEARXNG_SECRET: "fc57350014683f0e6e5938408f9742ccc584ceb561476e682af398e5d807dc78"

---
apiVersion: v1
kind: Pod
metadata:
  name: research-crawl
spec:
  hostname: research-crawl
  restartPolicy: OnFailure
  initContainers:
    - name: crawl-postgres-initdb
      image: ghcr.io/firecrawl/nuq-postgres:latest@sha256:8565e5f46000085c16d247a4354c41e2439dbcf1640f7dd6e6406c0b18c31732
      command:
        - sh
        - -ec
        - |
          find /initdb -mindepth 1 -delete
          cp -a /docker-entrypoint-initdb.d/. /initdb/
          cp /schema-fix/nuq-schema-fix.sql /initdb/090-nuq-schema-fix.sql
      volumeMounts:
        - name: crawl-postgres-initdb
          mountPath: /initdb
        - name: crawl-schema-fix
          mountPath: /schema-fix
          readOnly: true
  containers:
    - name: crawl-postgres
      image: ghcr.io/firecrawl/nuq-postgres:latest@sha256:8565e5f46000085c16d247a4354c41e2439dbcf1640f7dd6e6406c0b18c31732
      env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: research-crawl-secrets
              key: CRAWL_POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: research-crawl-secrets
              key: CRAWL_POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: research-crawl-secrets
              key: CRAWL_POSTGRES_PASSWORD
      ports:
        - containerPort: 5432
      volumeMounts:
        - name: crawl-postgres-data
          mountPath: /var/lib/postgresql/data
        - name: crawl-postgres-initdb
          mountPath: /docker-entrypoint-initdb.d

    - name: crawl-redis
      image: docker.io/library/redis:7-alpine
      command: ["redis-server", "--bind", "0.0.0.0"]
      ports:
        - containerPort: 6379

    - name: crawl-rabbitmq
      image: docker.io/library/rabbitmq:3-management
      command: ["rabbitmq-server"]
      ports:
        - containerPort: 5672
        - containerPort: 15672

    - name: firecrawl-playwright
      image: ghcr.io/firecrawl/playwright-service:latest@sha256:9e0737bc09df28275aab29726b1c0824a7725113945434e843385d487b7f7ec6
      ports:
        - containerPort: 3000
      env:
        - name: PORT
          value: "3000"
      volumeMounts:
        - name: crawl-playwright-data
          mountPath: /app/data

    - name: searxng
      image: searxng/searxng:latest@sha256:0bbe85fb9bebe413a26c0e385c76309d15c91fdb9dc8a6bf01b35b714d0ece43
      env:
        - name: SEARXNG_SECRET
          valueFrom:
            secretKeyRef:
              name: research-crawl-secrets
              key: SEARXNG_SECRET
        - name: GRANIAN_HOST
          value: "0.0.0.0"
        - name: GRANIAN_PORT
          value: "8085"
      ports:
        - containerPort: 8085
      volumeMounts:
        - name: searxng-settings
          mountPath: /etc/searxng
          readOnly: true
        - name: crawl-searxng-cache
          mountPath: /var/cache/searxng

    - name: firecrawl
      image: ghcr.io/firecrawl/firecrawl:latest@sha256:86e8bf1ec55bc39cc3fe2ab146f73104e3028376e5812bbf300c65209c46a3d3
      ports:
        - containerPort: 3002
      livenessProbe:
        exec:
          command:
            - node
            - -e
            - "const s=require('net').connect({host:'127.0.0.1',port:3002}); s.on('connect',()=>{s.end(); process.exit(0);}); s.on('error',()=>process.exit(1)); setTimeout(()=>process.exit(1),1500);"
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 6
      env:
        - name: PORT
          value: "3002"
        - name: HOST
          value: "0.0.0.0"
        - name: USE_DB_AUTHENTICATION
          value: "false"
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: research-crawl-secrets
              key: CRAWL_POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: research-crawl-secrets
              key: CRAWL_POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: research-crawl-secrets
              key: CRAWL_POSTGRES_PASSWORD
        - name: BULL_AUTH_KEY
          valueFrom:
            secretKeyRef:
              name: research-crawl-secrets
              key: BULL_AUTH_KEY
        - name: REDIS_URL
          value: "redis://127.0.0.1:6379"
        - name: REDIS_RATE_LIMIT_URL
          value: "redis://127.0.0.1:6379"
        - name: PLAYWRIGHT_MICROSERVICE_URL
          value: "http://127.0.0.1:3000/scrape"
        - name: SEARXNG_ENDPOINT
          value: "http://127.0.0.1:8085"
        - name: NUQ_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: research-crawl-secrets
              key: CRAWL_DATABASE_URL
        - name: NUQ_RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: research-crawl-secrets
              key: CRAWL_RABBITMQ_URL
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: research-crawl-secrets
              key: CRAWL_DATABASE_URL
        - name: BLOCK_MEDIA
          value: "true"
        - name: MAX_CPU
          value: "0.7"
        - name: MAX_RAM
          value: "0.7"
      volumeMounts:
        - name: crawl-firecrawl-data
          mountPath: /app/data

  volumes:
    - name: crawl-postgres-data
      persistentVolumeClaim:
        claimName: crawl-nuq-postgres-data
    - name: crawl-postgres-initdb
      emptyDir: {}
    - name: crawl-schema-fix
      configMap:
        name: crawl-schema-fix
    - name: crawl-firecrawl-data
      persistentVolumeClaim:
        claimName: crawl-firecrawl-data
    - name: crawl-playwright-data
      persistentVolumeClaim:
        claimName: crawl-playwright-data
    - name: crawl-searxng-cache
      persistentVolumeClaim:
        claimName: crawl-searxng-cache
    - name: searxng-settings
      configMap:
        name: crawl-searxng-config
