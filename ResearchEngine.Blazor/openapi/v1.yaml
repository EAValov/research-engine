components:
  schemas:
    AddedLearningDto:
      required:
        - learningId
        - sourceId
        - learningGroupId
        - importanceScore
        - createdAt
        - text
      type: object
      properties:
        learningId:
          type: string
          format: uuid
        sourceId:
          type: string
          format: uuid
        learningGroupId:
          type: string
          format: uuid
        importanceScore:
          pattern: ^-?(?:0|[1-9]\d*)(?:\.\d+)?(?:[eE][+-]?\d+)?$
          type:
            - number
            - string
          format: float
        createdAt:
          type: string
          format: date-time
        text:
          type: string
    AddLearningRequest:
      required:
        - text
      type: object
      properties:
        text:
          maxLength: 10000
          minLength: 3
          type: string
        reference:
          maxLength: 4000
          type:
            - "null"
            - string
        evidenceText:
          maxLength: 20000
          type:
            - "null"
            - string
        importanceScore:
          maximum: 1
          minimum: 0
          pattern: ^-?(?:0|[1-9]\d*)(?:\.\d+)?(?:[eE][+-]?\d+)?$
          type:
            - "null"
            - number
            - string
          format: float
        language:
          maxLength: 20
          type:
            - "null"
            - string
        region:
          maxLength: 500
          type:
            - "null"
            - string
    AddLearningResponse:
      required:
        - jobId
        - learning
      type: object
      properties:
        jobId:
          type: string
          format: uuid
        learning:
          $ref: "#/components/schemas/AddedLearningDto"
    BatchResolveLearningGroupsRequest:
      required:
        - learningIds
      type: object
      properties:
        learningIds:
          minItems: 1
          type: array
          items:
            type: string
            format: uuid
    BatchResolveLearningGroupsResponse:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ResolvedLearningGroupDto"
    CancelJobRequest:
      type: object
      properties:
        reason:
          maxLength: 2000
          type:
            - "null"
            - string
    CancelJobResponse:
      required:
        - jobId
        - status
      type: object
      properties:
        jobId:
          type: string
          format: uuid
        status:
          type: string
    ChatMessage:
      type: object
      properties:
        role:
          type: string
        content:
          type: string
    ChatRequest:
      type: object
      properties:
        model:
          type: string
        stream:
          type: boolean
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
    ClarificationDto:
      required:
        - question
        - answer
      type: object
      properties:
        question:
          type: string
        answer:
          type: string
    CreateResearchJobRequest:
      required:
        - query
        - clarifications
        - breadth
        - depth
        - language
        - region
      type: object
      properties:
        query:
          type: string
        clarifications:
          type:
            - "null"
            - array
          items:
            $ref: "#/components/schemas/ClarificationDto"
        breadth:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - "null"
            - integer
            - string
          format: int32
        depth:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - "null"
            - integer
            - string
          format: int32
        language:
          type:
            - "null"
            - string
        region:
          type:
            - "null"
            - string
    CreateResearchJobResponse:
      required:
        - jobId
      type: object
      properties:
        jobId:
          type: string
          format: uuid
    CreateSynthesisResponse:
      required:
        - jobId
        - synthesisId
