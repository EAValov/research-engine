apiVersion: v1
kind: ConfigMap
metadata:
  name: research-edge-caddyfile
data:
  Caddyfile: |
    {
      admin off
    }
    http://localhost:8080, http://127.0.0.1:8080 {
      encode zstd gzip
      @api path /api* /health* /openapi* /scalar* /hangfire*
      reverse_proxy @api research-app:8080
      reverse_proxy research-app:8082
    }
    http://research-webui.llm.local:8080 {
      redir https://research-webui.llm.local:8443{uri} permanent
    }
    https://research-webui.llm.local:8443 {
      tls internal
      encode zstd gzip
      @api path /api* /health* /openapi* /scalar* /hangfire*
      reverse_proxy @api research-app:8080
      reverse_proxy research-app:8082
    }

---
apiVersion: v1
kind: Pod
metadata:
  name: research-edge
  annotations:
    io.podman.annotations.networks: '["llm-net"]'
spec:
  hostname: research-edge
  containers:
    - name: caddy
      image: docker.io/library/caddy:2.8
      ports:
        - containerPort: 8080
          hostPort: 8080
        - containerPort: 8443
          hostPort: 8443
      volumeMounts:
        - name: caddy-config
          mountPath: /etc/caddy/Caddyfile
          subPath: Caddyfile
      env:
        - name: XDG_DATA_HOME
          value: /data
  volumes:
    - name: caddy-config
      configMap:
        name: research-edge-caddyfile
