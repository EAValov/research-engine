apiVersion: v1
kind: Pod
metadata:
  name: research-llm
spec:
  hostname: research-llm
  containers:
    - name: vllm
      image: docker.io/vllm/vllm-openai:v0.18.0-cu130
      ports:
        - containerPort: 8000
      resources:
        limits:
          "nvidia.com/gpu=all": 1
      env:
        - name: HF_HOME
          value: /root/.cache/huggingface
        - name: HUGGINGFACE_HUB_CACHE
          value: /root/.cache/huggingface
        - name: LD_LIBRARY_PATH
          value: /usr/lib/wsl/lib:${LD_LIBRARY_PATH}
      args:
        - "nvidia/Qwen3-30B-A3B-NVFP4"
        - "--host"
        - "0.0.0.0"
        - "--port"
        - "8000"
        - "--quantization"
        - "modelopt_fp4"
        - "--gpu-memory-utilization"
        - "0.93"
        - "--max-model-len"
        - "32768"
        - "--max-num-seqs"
        - "1"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser"
        - "hermes"
      volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/huggingface
        - name: model-compile-cache
          mountPath: /root/.cache/vllm
        - name: wsl-cuda-lib
          mountPath: /usr/lib/wsl/lib
          readOnly: true
  volumes:
    - name: model-cache
      persistentVolumeClaim:
        claimName: model-cache
    - name: model-compile-cache
      persistentVolumeClaim:
        claimName: model-compile-cache
    - name: wsl-cuda-lib
      hostPath:
        path: /usr/lib/wsl/lib
        type: Directory
