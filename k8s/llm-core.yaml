apiVersion: v1
kind: ConfigMap
metadata:
  name: caddyfile
data:
  Caddyfile: |
    {
      admin off
    }
    :9080 {
      redir https://{host}:8443{uri}
    }
    webui.llm.local:8443 {
      tls internal
      encode zstd gzip
      reverse_proxy open-webui:8081
    }
    api.llm.local:8443 {
      tls internal
      encode zstd gzip
      reverse_proxy vllm:8000
    }
    crawl.llm.local:8443 {
      tls internal
      encode zstd gzip
      reverse_proxy firecrawl:3002
    }
    search.llm.local:8443 {
      tls internal
      encode zstd gzip
      reverse_proxy searxng:8085
    }
    embedding.llm.local:8443 {
      tls internal
      encode zstd gzip
      reverse_proxy vllm-embeddings:8001
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: llm-core
  annotations:
    io.podman.annotations.networks: '["llm-int"]'
spec:
  hostname: llm-core
  containers:
    - name: caddy
      image: caddy:2.8
      ports:
        - containerPort: 9080
          hostPort: 8080
        - containerPort: 8443
          hostPort: 8443
      volumeMounts:
        - name: caddy-data
          mountPath: /data
        - name: caddy-config
          mountPath: /etc/caddy/Caddyfile
          subPath: Caddyfile
      env:
        - name: XDG_DATA_HOME
          value: /data

    - name: vllm
      image: vllm/vllm-openai:latest
      ports:
        - containerPort: 8000
      resources:
        limits:
          "nvidia.com/gpu=all": 1 
      env:
        - name: HF_HOME
          value: /root/.cache/huggingface
        - name: HUGGINGFACE_HUB_CACHE
          value: /root/.cache/huggingface
      args:
        - "--model"
        - "Qwen/Qwen3-32B-AWQ"
        - "--host"
        - "0.0.0.0"
        - "--port"
        - "8000"
        - "--quantization"
        - "awq_marlin"
        - "--gpu-memory-utilization"
        - "0.9"
        - "--dtype"
        - "half"
        - "--kv-cache-dtype"
        - "fp8"
        - "--max-num-seqs"
        - "16"
        - "--max-model-len"
        - "32768" 
        - "--enable-auto-tool-choice"
        - "--tool-call-parser"
        - "hermes"
      volumeMounts:
        - name: models
          mountPath: /root/.cache/huggingface
        - name: qwen-templates
          mountPath: /templates
          
    - name: vllm-embeddings
      image: vllm-openai-cpu
      ports:
        - containerPort: 8001
      env:
        - name: HF_HOME
          value: /root/.cache/huggingface
        - name: HUGGINGFACE_HUB_CACHE
          value: /root/.cache/huggingface
      args:
        - "Qwen/Qwen3-Embedding-0.6B"
        - "--task"
        - "embedding"
        - "--host"
        - "0.0.0.0"
        - "--port"
        - "8001"
      volumeMounts:
        - name: models
          mountPath: /root/.cache/huggingface

    - name: open-webui
      image: ghcr.io/open-webui/open-webui:main
      ports:
        - containerPort: 8081
      env:
        - name: PORT
          value: "8081"
        - name: HOST
          value: "0.0.0.0"
        - name: OPENAI_API_BASE_URL
          value: http://vllm:8000/v1
        - name: OPENAI_API_KEY
          value: "local"
        - name: ENABLE_MODEL_SELECTOR
          value: "true"
        - name: WEBUI_URL
          value: "https://webui.llm.local:8443"
        - name: ENABLE_WEB_SEARCH
          value: "true"
        - name: WEB_SEARCH_ENGINE
          value: "searxng"
        - name: SEARXNG_QUERY_URL
          value: "http://searxng:8085/search?q=<query>"
        - name: WEB_SEARCH_RESULT_COUNT
          value: "4"
        - name: RAG_WEB_LOADER_ENGINE
          value: "firecrawl"
        - name: FIRE_CRAWL_API_BASE_URL
          value: "http://firecrawl:3002/v1"
        - name: WEB_LOADER_CONCURRENT_REQUESTS
          value: "4"
        # 🔐 from Secret
        - name: FIRE_CRAWL_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-secrets
              key: FIRE_CRAWL_API_KEY
      volumeMounts:
        - name: openwebui-data
          mountPath: /app/backend/data

    - name: redis
      image: redis:7-alpine
      command: ["redis-server","--bind","0.0.0.0"]
      ports:
        - containerPort: 6379

    - name: nuq-postgres
      image: localhost/nuq-postgres:latest
      env:
        - name: POSTGRES_DB
          value: firecrawl
        - name: POSTGRES_USER
          value: firecrawl
        - name: POSTGRES_PASSWORD
          value: firecrawl
      ports:
        - containerPort: 5432
          hostPort: 5432 
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data

  volumes:
    - name: caddy-config
      configMap:
        name: caddyfile
    - name: caddy-data
      hostPath:
        path: /mnt/c/LLM/caddy
        type: DirectoryOrCreate
    - name: models
      hostPath:
        path: /mnt/c/LLM/models
        type: DirectoryOrCreate
    - name: openwebui-data
      hostPath:
        path: /mnt/c/LLM/open-webui
        type: DirectoryOrCreate
    - name: postgres-data
      persistentVolumeClaim:
        claimName: postgres-data
    - name: qwen-templates
      hostPath:
        path: /mnt/c/LLM/qwen-templates
        type: DirectoryOrCreate