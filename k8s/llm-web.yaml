apiVersion: v1
kind: Pod
metadata:
  name: llm-web
  annotations:
    io.podman.annotations.networks: '["llm-int","podman"]'
spec:
  hostname: llm-web
  containers:
    - name: firecrawl-playwright
      image: ghcr.io/firecrawl/playwright-service:latest
      ports:
        - containerPort: 3000
      env:
        - name: PORT
          value: "3000"
      volumeMounts:
        - name: playwright-data
          mountPath: /app/data

    - name: searxng
      image: searxng/searxng:latest
      env:
        - name: GRANIAN_HOST
          value: "0.0.0.0"
        - name: GRANIAN_PORT
          value: "8085"
      ports:
        - containerPort: 8085        
      volumeMounts:
        - name: searxng-config
          mountPath: /etc/searxng
          readOnly: true

    - name: firecrawl
      image: ghcr.io/firecrawl/firecrawl:stable
      ports:
        - containerPort: 3002
      env:
        - name: PORT
          value: "3002"
        - name: HOST
          value: "0.0.0.0"
        - name: USE_DB_AUTHENTICATION
          value: "false"
        - name: BULL_AUTH_KEY
          valueFrom:
            secretKeyRef:
              name: llm-secrets
              key: BULL_AUTH_KEY
        - name: FIRE_CRAWL_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-secrets
              key: FIRE_CRAWL_API_KEY
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: REDIS_RATE_LIMIT_URL
          value: "redis://redis:6379"
        - name: PLAYWRIGHT_MICROSERVICE_URL
          value: "http://firecrawl-playwright:3000/scrape"
        - name: SEARXNG_ENDPOINT
          value: "http://searxng:8085"
        - name: NUQ_DATABASE_URL
          value: "postgresql://firecrawl:firecrawl@nuq-postgres:5432/firecrawl?sslmode=disable"
        - name: DATABASE_URL
          value: "postgresql://firecrawl:firecrawl@nuq-postgres:5432/firecrawl?sslmode=disable"
      volumeMounts:
        - name: firecrawl-data
          mountPath: /app/data

  volumes:
    - name: firecrawl-data
      hostPath:
        path: /mnt/c/LLM/firecrawl
        type: DirectoryOrCreate
    - name: playwright-data
      hostPath:
        path: /mnt/c/LLM/playwright
        type: DirectoryOrCreate
    - name: searxng-config
      hostPath:
        path: /mnt/c/LLM/searxng
        type: DirectoryOrCreate