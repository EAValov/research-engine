apiVersion: v1
kind: Pod
metadata:
  name: research-api
  annotations:
    io.podman.annotations.networks: '["llm-int"]'
spec:
  hostname: research-api
  containers:
    - name: research-api
      image: localhost/research-api:chat
      workingDir: /app
      env:
        - name: ASPNETCORE_URLS
          value: "http://0.0.0.0:8080"
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: research-api-log
          mountPath: /app/logs
          readOnly: false

  volumes:
    - name: research-api-log
      hostPath:
        path: /mnt/c/LLM/logs
        type: DirectoryOrCreate