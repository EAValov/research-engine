apiVersion: v1
kind: Secret
metadata:
  name: research-stack-secrets
type: Opaque
stringData:
  ChatConfig__ApiKey: "Y6BksOt4+wdRsAJwZIrFV3Yo37fdl+2tPScWnfaT9S+IXekwc6HgcJqQVvfPpoD4"
  EmbeddingConfig__ApiKey: "ollama"
  BearerAuthenticationOptions__BearerTokens__0: "RYCQlDNSFnJgUrOIZdnh4mlOghdkzhCntgeDjsJqCYFz7tou1F1bZi8oNJ4C0hav"
  POSTGRES_DB: "firecrawl"
  POSTGRES_USER: "firecrawl"
  POSTGRES_PASSWORD: "df3a275eb955fcc7d3048a479d4d757a"
  ConnectionStrings__ResearchDb: "Host=nuq-postgres;Port=5432;Database=research;Username=firecrawl;Password=df3a275eb955fcc7d3048a479d4d757a"
  ConnectionStrings__HangfireDb: "Host=nuq-postgres;Port=5432;Database=jobs;Username=firecrawl;Password=df3a275eb955fcc7d3048a479d4d757a"
  NUQ_DATABASE_URL: "postgresql://firecrawl:df3a275eb955fcc7d3048a479d4d757a@nuq-postgres:5432/firecrawl?sslmode=disable"
  DATABASE_URL: "postgresql://firecrawl:df3a275eb955fcc7d3048a479d4d757a@nuq-postgres:5432/firecrawl?sslmode=disable"
  OPENAI_API_KEY: "A54TBSzKIZfUXbwz1vBvoZcIis4ClU8vWtdfyYIjF7k="
  FIRE_CRAWL_API_KEY: "WkMuaTD254l96hxmUIKrATIAFNyRK0UiMss12ayDO+A="
  BULL_AUTH_KEY: "28d4f12a03a9476ba93e59e3fa752623e090f9798ff94d1089dd5f706ae8213f"
  SEARXNG_SECRET: "fc57350014683f0e6e5938408f9742ccc584ceb561476e682af398e5d807dc78"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: caddyfile
data:
  Caddyfile: |
    {
      admin off
    }
    :9080 {
      redir https://{host}:8443{uri}
    }
    webui.llm.local:8443 {
      tls internal
      encode zstd gzip
      reverse_proxy open-webui:8081
    }
    api.llm.local:8443 {
      tls internal
      encode zstd gzip
      reverse_proxy vllm:8000
    }
    crawl.llm.local:8443 {
      tls internal
      encode zstd gzip
      reverse_proxy firecrawl:3002
    }
    search.llm.local:8443 {
      tls internal
      encode zstd gzip
      reverse_proxy searxng:8085
    }
    embedding.llm.local:8443 {
      tls internal
      encode zstd gzip
      reverse_proxy ollama:11434
    }
    research-api.llm.local:8443 {
      tls internal
      encode zstd gzip
      reverse_proxy research-api:8080
    }
    research-webui.llm.local:8443 {
      tls internal
      encode zstd gzip
      reverse_proxy research-blazor:8082
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
data:
  settings.yml: |
    use_default_settings: true
    general:
      instance_name: "Research Stack Search"
    server:
      bind_address: "0.0.0.0"
      port: 8085
      # Is overwritten by ${SEARXNG_SECRET}
      secret_key: "ultrasecretkey"
    search:
      formats:
        - html
        - json
    ui:
      static_use_hash: true

---
apiVersion: v1
kind: Pod
metadata:
  name: llm-stack
  annotations:
    io.podman.annotations.networks: '["llm-net"]'
spec:
  hostname: llm-stack
  containers:
    - name: caddy
      image: caddy:2.8
      ports:
        - containerPort: 9080
          hostPort: 8080
        - containerPort: 8443
          hostPort: 8443
      volumeMounts:
        - name: caddy-data
          mountPath: /data
        - name: caddy-config
          mountPath: /etc/caddy/Caddyfile
          subPath: Caddyfile
      env:
        - name: XDG_DATA_HOME
          value: /data

    - name: vllm
      image: vllm/vllm-openai:v0.17.1
      ports:
        - containerPort: 8000
          hostPort: 8000
      resources:
        limits:
          "nvidia.com/gpu=all": 1
      env:
        - name: HF_HOME
          value: /root/.cache/huggingface
        - name: HUGGINGFACE_HUB_CACHE
          value: /root/.cache/huggingface
        - name: LD_LIBRARY_PATH
          value: /usr/lib/wsl/lib:${LD_LIBRARY_PATH}
      args:
        - "nvidia/Qwen3-30B-A3B-NVFP4"
        - "--host"
        - "0.0.0.0"
        - "--port"
        - "8000"
        - "--quantization"
        - "modelopt"
        - "--gpu-memory-utilization"
        - "0.9"
        - "--max-model-len"
        - "32768"
        - "--max-num-seqs"
        - "1"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser"
        - "hermes"
      volumeMounts:
        - name: models
          mountPath: /root/.cache/huggingface
        - name: wsl-cuda-lib
          mountPath: /usr/lib/wsl/lib
          readOnly: true
        - name: vllm-compile-cache
          mountPath: /root/.cache/vllm

    - name: ollama
      image: ollama/ollama:0.17.7
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          ollama serve &
          pid="$!"
          until ollama list >/dev/null 2>&1; do sleep 2; done
          ollama pull qwen3-embedding:0.6b
          wait "$pid"
      ports:
        - containerPort: 11434
      env:
        - name: OLLAMA_HOST
          value: "0.0.0.0:11434"
      volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama

    - name: open-webui
      image: ghcr.io/open-webui/open-webui:0.8.10
      ports:
        - containerPort: 8081
      env:
        - name: PORT
          value: "8081"
        - name: HOST
          value: "0.0.0.0"
        - name: OPENAI_API_BASE_URL
          value: "http://vllm:8000/v1"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: research-stack-secrets
              key: OPENAI_API_KEY
        - name: ENABLE_MODEL_SELECTOR
          value: "true"
        - name: WEBUI_URL
          value: "https://webui.llm.local:8443"
        - name: ENABLE_WEB_SEARCH
          value: "true"
        - name: WEB_SEARCH_ENGINE
          value: "searxng"
        - name: SEARXNG_QUERY_URL
          value: "http://searxng:8085/search?q=<query>"
        - name: WEB_SEARCH_RESULT_COUNT
          value: "4"
        - name: RAG_WEB_LOADER_ENGINE
          value: "firecrawl"
        - name: FIRE_CRAWL_API_BASE_URL
          value: "http://firecrawl:3002/v1"
        - name: FIRE_CRAWL_API_KEY
          valueFrom:
            secretKeyRef:
              name: research-stack-secrets
              key: FIRE_CRAWL_API_KEY
        - name: WEB_LOADER_CONCURRENT_REQUESTS
          value: "4"
      volumeMounts:
        - name: openwebui-data
          mountPath: /app/backend/data

    - name: redis
      image: redis:7-alpine
      command: ["redis-server", "--bind", "0.0.0.0"]
      ports:
        - containerPort: 6379

    - name: firecrawl-playwright
      image: ghcr.io/firecrawl/playwright-service@sha256:46967190643b3506bbf32774c841787af353d750bcf4d8ee9edc25ecf35e0dea
      ports:
        - containerPort: 3000
      env:
        - name: PORT
          value: "3000"
      volumeMounts:
        - name: playwright-data
          mountPath: /app/data

    - name: nuq-postgres
      image: localhost/nuq-postgres:latest
      env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: research-stack-secrets
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: research-stack-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: research-stack-secrets
              key: POSTGRES_PASSWORD
      ports:
        - containerPort: 5432
          hostPort: 5432
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data

    - name: firecrawl
      image: ghcr.io/firecrawl/firecrawl@sha256:24aab751ce90357f1398cef41c82707a3aa65f66334af636fd2e5b9a2f4d8921
      ports:
        - containerPort: 3002
          hostPort: 8095
      env:
        - name: PORT
          value: "3002"
        - name: HOST
          value: "0.0.0.0"
        - name: USE_DB_AUTHENTICATION
          value: "false"
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: research-stack-secrets
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: research-stack-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: research-stack-secrets
              key: POSTGRES_PASSWORD
        - name: BULL_AUTH_KEY
          valueFrom:
            secretKeyRef:
              name: research-stack-secrets
              key: BULL_AUTH_KEY
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: REDIS_RATE_LIMIT_URL
          value: "redis://redis:6379"
        - name: PLAYWRIGHT_MICROSERVICE_URL
          value: "http://firecrawl-playwright:3000/scrape"
        - name: SEARXNG_ENDPOINT
          value: "http://searxng:8085"
        - name: NUQ_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: research-stack-secrets
              key: NUQ_DATABASE_URL
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: research-stack-secrets
              key: DATABASE_URL
        - name: BLOCK_MEDIA
          value: "true"
        - name: MAX_CPU
          value: "0.95"
        - name: MAX_RAM
          value: "0.95"
      volumeMounts:
        - name: firecrawl-data
          mountPath: /app/data

    - name: searxng
      image: searxng/searxng:latest@sha256:95e59f5ba7d48b4c7ee92f2705907e52c5b98715b0d8c4802863322a502a8c4a
      env:
        - name: SEARXNG_SECRET
          valueFrom:
            secretKeyRef:
              name: research-stack-secrets
              key: SEARXNG_SECRET
        - name: GRANIAN_HOST
          value: "0.0.0.0"
        - name: GRANIAN_PORT
          value: "8085"
      ports:
        - containerPort: 8085
      volumeMounts:
        - name: searxng-settings
          mountPath: /etc/searxng
          readOnly: true

    - name: research-api
      image: localhost/research-api:chat
      workingDir: /app
      envFrom:
        - secretRef:
            name: research-stack-secrets
            optional: false
      env:
        - name: API_SERVER_PORT
          value: "8080"
        - name: API_SERVER_HOST_PORT
          value: "8090"
        - name: BLAZOR_PORT
          value: "8082"
        - name: BLAZOR_HOST_PORT
          value: "5170"
        - name: ASPNETCORE_URLS
          value: "http://0.0.0.0:8080"
        - name: ConnectionStrings__ResearchDb
          valueFrom:
            secretKeyRef:
              name: research-stack-secrets
              key: ConnectionStrings__ResearchDb
        - name: ConnectionStrings__HangfireDb
          valueFrom:
            secretKeyRef:
              name: research-stack-secrets
              key: ConnectionStrings__HangfireDb
        - name: ConnectionStrings__Redis
          value: "redis:6379"
        - name: FirecrawlOptions__BaseUrl
          value: "http://firecrawl:3002"
        - name: FirecrawlOptions__ApiKey
          valueFrom:
            secretKeyRef:
              name: research-stack-secrets
              key: FIRE_CRAWL_API_KEY
        - name: FirecrawlOptions__HttpClientTimeoutSeconds
          value: "600"
        - name: ChatConfig__Endpoint
          value: "http://vllm:8000/v1"
        - name: ChatConfig__ModelId
          value: "nvidia/Qwen3-30B-A3B-NVFP4"
        - name: EmbeddingConfig__Endpoint
          value: "http://ollama:11434/v1"
        - name: EmbeddingConfig__ModelId
          value: "qwen3-embedding:0.6b"
        - name: EmbeddingConfig__Dimension
          value: "1024"
        - name: RedisEventBusOptions__ConnectionString
          value: "redis:6379"
        - name: BearerAuthenticationOptions__Enabled
          value: "true"
        - name: Cors__AllowedOrigins__0
          value: "http://localhost:5170"
        - name: Cors__AllowedOrigins__1
          value: "http://localhost:5173"
        - name: Cors__AllowedOrigins__2
          value: "http://127.0.0.1:5170"
        - name: Cors__AllowedOrigins__3
          value: "http://127.0.0.1:5173"
        - name: Cors__AllowedOrigins__4
          value: "https://research-webui.llm.local:8443"
      ports:
        - containerPort: 8080
          hostPort: 8090
      volumeMounts:
        - name: research-api-log
          mountPath: /app/logs
          readOnly: false
      livenessProbe:
        httpGet:
          path: /health/live
          port: 8080
        initialDelaySeconds: 10
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /health/ready
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10

    - name: research-blazor
      image: localhost/research-blazor:latest
      envFrom:
        - secretRef:
            name: research-stack-secrets
            optional: false
      env:
        - name: BLAZOR_PORT
          value: "8082"
        - name: BLAZOR_HOST_PORT
          value: "5170"
        - name: API_SERVER_PORT
          value: "8080"
        - name: API_SERVER_HOST_PORT
          value: "8090"
        - name: API_BASE_URL
          value: "https://research-api.llm.local:8443"
      ports:
        - containerPort: 8082
          hostPort: 5170
      livenessProbe:
        httpGet:
          path: /index.html
          port: 8082
        initialDelaySeconds: 5
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /index.html
          port: 8082
        initialDelaySeconds: 3
        periodSeconds: 10

  volumes:
    - name: caddy-config
      configMap:
        name: caddyfile
    - name: caddy-data
      persistentVolumeClaim:
        claimName: caddy-data
    - name: models
      persistentVolumeClaim:
        claimName: models
    - name: openwebui-data
      persistentVolumeClaim:
        claimName: openwebui-data
    - name: firecrawl-data
      persistentVolumeClaim:
        claimName: firecrawl-data
    - name: playwright-data
      persistentVolumeClaim:
        claimName: playwright-data
    - name: postgres-data
      persistentVolumeClaim:
        claimName: postgres-data
    - name: wsl-cuda-lib
      hostPath:
        path: /usr/lib/wsl/lib
        type: Directory
    - name: vllm-compile-cache
      persistentVolumeClaim:
        claimName: vllm-compile-cache
    - name: ollama-data
      persistentVolumeClaim:
        claimName: ollama-data
    - name: research-api-log
      persistentVolumeClaim:
        claimName: research-api-log
    - name: searxng-settings
      configMap:
        name: searxng-config
