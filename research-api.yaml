apiVersion: v1
kind: Secret
metadata:
  name: research-api-secrets
type: Opaque
stringData:
  ConnectionStrings__ResearchDb: "Host=nuq-postgres;Port=5432;Database=research;Username=firecrawl;Password=firecrawl"
  ConnectionStrings__HangfireDb: "Host=nuq-postgres;Port=5432;Database=jobs;Username=firecrawl;Password=firecrawl"
  ChatConfig__ApiKey: ""
  EmbeddingConfig__ApiKey: ""
  BearerAuthenticationOptions__BearerTokens__0: "9h32F2fNuwMQL0OUujpUoIF6l8S/lGPOM1ylNhH+MKQ="

---
apiVersion: v1
kind: Pod
metadata:
  name: research-api
  annotations:
    io.podman.annotations.networks: '["llm-net"]'
spec:
  hostname: research-api
  containers:
    - name: research-api
      image: localhost/research-api:chat
      workingDir: /app
      envFrom:
        - secretRef:
            name: research-api-secrets
            optional: false
      env:
        - name: API_SERVER_PORT
          value: "8080"
        - name: API_SERVER_HOST_PORT
          value: "8090"
        - name: BLAZOR_PORT
          value: "8081"
        - name: BLAZOR_HOST_PORT
          value: "5170"
        - name: ASPNETCORE_URLS
          value: "http://0.0.0.0:8080"
        - name: ConnectionStrings__Redis
          value: "redis:6379"
        - name: FirecrawlOptions__BaseUrl
          value: "http://firecrawl:3002"
        - name: FirecrawlOptions__HttpClientTimeoutSeconds
          value: "600"
        - name: ChatConfig__Endpoint
          value: "http://vllm:8000/v1"
        - name: ChatConfig__ModelId
          value: "nvidia/Qwen3-30B-A3B-NVFP4"
        - name: EmbeddingConfig__Endpoint
          value: "http://vllm-embeddings:8001/v1"
        - name: EmbeddingConfig__ModelId
          value: "Qwen/Qwen3-Embedding-0.6B"
        - name: EmbeddingConfig__Dimension
          value: "1024"
        - name: RedisEventBusOptions__ConnectionString
          value: "redis:6379"
        - name: BearerAuthenticationOptions__Enabled
          value: "true"
        - name: Cors__AllowedOrigins__0
          value: "http://localhost:5170"
        - name: Cors__AllowedOrigins__1
          value: "http://localhost:5173"
        - name: Cors__AllowedOrigins__2
          value: "http://127.0.0.1:5170"
        - name: Cors__AllowedOrigins__3
          value: "http://127.0.0.1:5173"
      ports:
        - containerPort: 8080
          hostPort: 8090
      volumeMounts:
        - name: research-api-log
          mountPath: /app/logs
          readOnly: false
      livenessProbe:
        httpGet:
          path: /health/live
          port: 8080
        initialDelaySeconds: 10
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /health/ready
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10

    - name: research-blazor
      image: localhost/research-blazor:latest
      envFrom:
        - secretRef:
            name: research-api-secrets
            optional: false
      env:
        - name: BLAZOR_PORT
          value: "8081"
        - name: BLAZOR_HOST_PORT
          value: "5170"
        - name: API_SERVER_PORT
          value: "8080"
        - name: API_SERVER_HOST_PORT
          value: "8090"
        - name: API_BASE_URL
          value: "http://localhost:8090"
      ports:
        - containerPort: 8081
          hostPort: 5170
      livenessProbe:
        httpGet:
          path: /index.html
          port: 8081
        initialDelaySeconds: 5
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /index.html
          port: 8081
        initialDelaySeconds: 3
        periodSeconds: 10

  volumes:
    - name: research-api-log
      hostPath:
        path: /mnt/c/LLM/logs
        type: DirectoryOrCreate
